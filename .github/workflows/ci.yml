name: Test, Lint and Build

on:
  pull_request:
    branches:
      - master

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure gradle is executable
        run: chmod +x services/payment-service/gradlew

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: pnpm install:all

      - name: Copy env files
        run: pnpm env:copy

      - name: Generate gRPC
        run: pnpm grpc:gen

      - name: Generate OpenApi
        run: pnpm openapi:gen

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
