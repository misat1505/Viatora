name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: pnpm install:all

      - name: Generate gRPC
        run: pnpm grpc:gen

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
