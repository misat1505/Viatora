/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java'
    id 'org.springframework.boot' version '4.1.0'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'com.google.protobuf' version '0.9.4'
}

repositories {
    mavenCentral()
}

ext {
    grpcVersion = '1.74.0'
    protobufVersion = '4.31.1'
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter'

    testImplementation 'org.mockito:mockito-junit-jupiter'

    implementation 'me.paulschwarz:spring-dotenv:4.0.0'

    implementation 'com.stripe:stripe-java:28.1.0'

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'

    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    runtimeOnly 'org.postgresql:postgresql'

    implementation 'org.springframework.boot:spring-boot-starter-flyway'
    implementation 'org.flywaydb:flyway-database-postgresql'

    implementation 'net.devh:grpc-server-spring-boot-starter:3.1.0.RELEASE'

    implementation "io.grpc:grpc-protobuf:${grpcVersion}"
    implementation "io.grpc:grpc-stub:${grpcVersion}"

    implementation "com.google.protobuf:protobuf-java:${protobufVersion}"

    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

sourceSets {
    main {
        proto {
            srcDir '../../docs/communication/grpc'
        }
    }
}

protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:${protobufVersion}"
    }

    plugins {
        grpc {
            artifact = "io.grpc:protoc-gen-grpc-java:${grpcVersion}"
        }
    }

    generateProtoTasks {
        all()*.plugins {
            grpc {}
        }
    }
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

tasks.register('buildWatch') {
    dependsOn classes
}
def envFile = layout.projectDirectory.file('.env').asFile
tasks.named('bootRun') {
    doFirst {
        if (envFile.exists()) {
            envFile.readLines().each { line ->
                line = line.trim()
                if (line && !line.startsWith('#')) {
                    def (key, value) = line.split('=', 2)
                    environment(key.trim(), value.trim())
                }
            }
        } else {
            println "UWAGA: brak pliku .env w ${envFile.absolutePath}"
        }
    }
}

test {
    useJUnitPlatform()
}
